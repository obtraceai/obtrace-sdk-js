name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: NODE_OPTIONS='--max-old-space-size=512' npm run build
      - run: npm test
